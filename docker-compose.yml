version: "3.9"

services:
  redis:
    image: redis:8-alpine
    container_name: quota-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: quota-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # 3 stateless quota-service instances sharing the same Redis and MongoDB
  quota-service-1:
    build: .
    container_name: quota-service-1
    ports:
      - "8001:8000"
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: quota_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  quota-service-2:
    build: .
    container_name: quota-service-2
    ports:
      - "8002:8000"
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: quota_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  quota-service-3:
    build: .
    container_name: quota-service-3
    ports:
      - "8003:8000"
    environment:
      REDIS_URL: redis://redis:6379
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: quota_db
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  load-simulator:
    build: .
    container_name: load-simulator
    command: python -m load_test.simulate
    environment:
      TARGETS: http://quota-service-1:8000,http://quota-service-2:8000,http://quota-service-3:8000
    depends_on:
      quota-service-1:
        condition: service_healthy
      quota-service-2:
        condition: service_healthy
      quota-service-3:
        condition: service_healthy

volumes:
  redis_data:
  mongo_data: